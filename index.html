<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBNET LIFT | Vertical Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --primary: #00f0ff;
            --secondary: #ff00c8;
            --accent: #39ff14;
            --text-color: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            position: relative;
            flex: 1;
            display: flex;
            overflow: hidden;
            background: #0d0d0d;
        }

        #render-canvas {
            flex: 1;
            background: #0d0d0d;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            position: absolute;
            padding: 20px;
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #stats-panel {
            top: 20px;
            left: 20px;
            width: 250px;
            border-left: 4px solid var(--primary);
        }

        #control-panel {
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 250px;
            display: flex;
            gap: 20px;
            transition: transform 0.3s ease;
        }

        #editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--primary);
            position: relative;
        }

        #code-editor {
            flex: 1;
            background: transparent;
            color: var(--primary);
            border: none;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        .btn-secondary {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 20px var(--secondary);
        }

        /* Scanline effect */
        #ui-overlay::after {
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.5;
        }

        .label {
            font-size: 10px;
            color: var(--primary);
            opacity: 0.7;
            margin-bottom: 5px;
            display: block;
            letter-spacing: 2px;
        }

        .value {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--primary);
            font-family: 'JetBrains Mono', monospace;
        }

        #mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .floor-indicator {
            position: absolute;
            right: 20px;
            top: 100px;
            bottom: 20px;
            display: flex;
            flex-direction: column-reverse;
            gap: 5px;
            pointer-events: auto;
            overflow-y: auto;
            padding-right: 5px;
        }

        .floor-indicator::-webkit-scrollbar {
            width: 4px;
        }

        .floor-indicator::-webkit-scrollbar-thumb {
            background: var(--primary);
        }

        .floor-btn {
            width: 45px;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .floor-btn.active {
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: inset 0 0 10px var(--secondary), 0 0 10px var(--secondary);
        }

        .blink {
            animation: blink-anim 0.5s infinite;
        }

        @keyframes blink-anim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #mode-selection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d0d0d;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .mode-card {
            width: 350px;
            padding: 30px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px;
        }

        .mode-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            transform: translateY(-5px);
        }

        .mode-card h3 {
            color: var(--primary);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .mode-card p {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
            font-family: 'JetBrains Mono', monospace;
        }

        #manual-ui {
            position: absolute;
            top: 20px;
            left: 290px;
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .elevator-control {
            width: 180px;
            background: rgba(13, 13, 13, 0.9);
            border: 1px solid var(--primary);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            font-size: 9px;
            padding: 5px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
            text-transform: uppercase;
        }

        .control-btn:hover {
            background: var(--primary);
            color: #000;
        }

        #shop-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            pointer-events: auto;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border: 1px solid var(--accent);
        }

        .glitch-text {
            font-size: 72px;
            color: var(--primary);
            text-shadow: 3px 3px var(--secondary), -3px -3px var(--accent);
            margin-bottom: 20px;
            letter-spacing: 5px;
            font-weight: 900;
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { text-shadow: 3px 3px var(--secondary), -3px -3px var(--accent); }
            25% { text-shadow: -3px 3px var(--secondary), 3px -3px var(--accent); }
            50% { text-shadow: 3px -3px var(--secondary), -3px 3px var(--accent); }
            75% { text-shadow: -3px -3px var(--secondary), 3px 3px var(--accent); }
            100% { text-shadow: 3px 3px var(--secondary), -3px -3px var(--accent); }
        }

        #top-bar {
            height: 60px;
            background: #000;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: relative;
            z-index: 100;
        }

        #main-layout {
            display: flex;
            height: calc(100vh - 60px);
            width: 100vw;
            overflow: hidden;
        }

        #floor-column {
            width: 20%;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
        }

        #shaft-column {
            width: 60%;
            position: relative;
            background: radial-gradient(circle at center, #111, #000);
        }

        #hud-column {
            width: 20%;
            border-left: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.8);
        }

        .floor-row {
            height: 120px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: relative;
            transition: background 0.3s;
        }

        .floor-row:hover { background: rgba(0, 240, 255, 0.05); }

        .floor-num {
            font-size: 24px;
            font-weight: 900;
            color: #333;
            width: 40px;
        }

        .floor-row.active .floor-num { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .waiting-dots {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-left: 15px;
            max-width: 100px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            box-shadow: 0 0 5px currentColor;
        }

        .hud-panel-v2 {
            background: var(--glass);
            padding: 15px;
            border: 1px solid var(--glass-border);
        }

        .speed-toggles {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 5px;
            background: #111;
            border: 1px solid #333;
            color: #555;
            font-size: 10px;
            cursor: pointer;
        }

        .btn-small.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(255, 0, 200, 0.1);
        }

        #resolution-warning {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0d0d;
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        @media (max-width: 1023px) {
            #resolution-warning { display: flex; }
            #main-layout, #top-bar { display: none; }
        }

        #shop-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 13, 13, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            overflow-y: auto;
            pointer-events: auto;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
        }

        .shop-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s;
        }

        .shop-card:hover { border-color: var(--primary); background: rgba(0, 240, 255, 0.05); }
        .shop-card h4 { color: var(--primary); letter-spacing: 1px; }
        .shop-card p { font-size: 11px; color: #888; font-family: 'JetBrains Mono'; }
        .shop-card .cost { font-size: 18px; color: var(--accent); font-weight: bold; }

        #confirm-modal {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0d0d0d;
            border: 2px solid var(--secondary);
            padding: 30px;
            z-index: 2100;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 200, 0.3);
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="resolution-warning">
        <h1 class="glitch-text" style="font-size: 24px;">RESOLUTION_BREACH</h1>
        <p>System UI requires minimum 1024px width for operational stability.</p>
    </div>

    <div id="top-bar">
        <h1 class="glitch-text" style="font-size: 24px; margin: 0; letter-spacing: 10px;">SUBNET LIFT</h1>
        <div id="global-stats" style="display: flex; gap: 30px; font-size: 12px; color: var(--primary);">
            <div>STATUS: <span style="color: #39ff14;">OPTIMAL</span></div>
            <div id="clock-display">TIME: 00:00</div>
        </div>
    </div>

    <div id="main-layout">
        <div id="floor-column">
            <!-- Floor strip 29 down to 0 -->
            <div id="floor-list-container"></div>
        </div>

        <div id="shaft-column">
            <canvas id="render-canvas"></canvas>
        </div>

        <div id="hud-column">
            <div id="hud-content">
                <div class="hud-panel-v2">
                    <span class="label">CORPORATE_COMPLIANCE</span>
                    <div id="compliance-value" class="value" style="font-size: 24px;">100%</div>
                    <div id="credits-value" class="value" style="color: var(--accent); font-size: 18px;">0 CR</div>
                </div>

                <div class="hud-panel-v2" style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <div><span class="label">STREAK</span><div id="streak-value" class="value">1.0x</div></div>
                        <div><span class="label">LOAD</span><div id="load-value" class="value">0%</div></div>
                    </div>
                    <span class="label">AVG_WAIT</span>
                    <div id="avg-wait-value" class="value">0s</div>
                    <span class="label" style="margin-top: 10px; display: block;">HIGH_SCORE</span>
                    <div id="high-score-value" class="value" style="color: var(--accent);">0</div>
                </div>

                <div class="hud-panel-v2" style="margin-top: 20px;">
                    <span class="label">SIMULATION_CLOCK</span>
                    <div class="speed-toggles">
                        <button onclick="world.setSimSpeed(1)" id="speed-1" class="btn-small active">1X</button>
                        <button onclick="world.setSimSpeed(5)" id="speed-5" class="btn-small">5X</button>
                        <button onclick="world.setSimSpeed(10)" id="speed-10" class="btn-small">10X</button>
                    </div>
                </div>

                <div class="hud-panel-v2" style="margin-top: 20px;">
                    <button class="btn btn-secondary" style="width: 100%;" onclick="world.toggleShop(true)">INFRASTRUCTURE_SHOP</button>
                    <button class="btn" style="width: 100%; margin-top: 10px;" id="mode-switch-btn" onclick="world.confirmModeSwitch()">SWITCH_TO_LOGIC</button>
                </div>

                <div id="coding-panel" style="display: none; flex-direction: column; flex-grow: 1; margin-top: 20px; overflow: hidden;">
                    <span class="label">OPTIMIZER_PROTOCOL</span>
                    <textarea id="code-editor" spellcheck="false" style="flex-grow: 1; min-height: 300px;">// Protocol injected...</textarea>
                    <button id="btn-apply" class="btn" style="margin-top: 10px;">EXECUTE_PROTOCOL</button>
                </div>
                
                <div id="manual-controls" style="margin-top: 20px;">
                    <!-- Manual controls generated here -->
                </div>
            </div>
        </div>
    </div>

    <div id="shop-overlay">
        <div style="display: flex; justify-content: space-between; width: 100%; max-width: 1200px; align-items: center;">
            <h1 class="glitch-text" style="font-size: 32px; margin-bottom: 0;">INFRASTRUCTURE_SHOP</h1>
            <button class="btn" onclick="world.toggleShop(false)">EXIT_TERMINAL</button>
        </div>
        <div class="shop-grid" id="shop-grid"></div>
    </div>

    <div id="confirm-modal">
        <h3 id="confirm-title">CONFIRM_PURCHASE</h3>
        <p id="confirm-desc" style="font-size: 12px; color: #888; text-align: center;"></p>
        <div style="display: flex; gap: 20px;">
            <button class="btn" id="confirm-yes">AUTHORIZE</button>
            <button class="btn btn-secondary" onclick="document.getElementById('confirm-modal').style.display='none'">ABORT</button>
        </div>
    </div>

    <script>
        const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type = 'sine', duration = 0.1, volume = 0.1) {
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, AudioCtx.currentTime);
            gain.gain.setValueAtTime(volume, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(AudioCtx.destination);
            osc.start();
            osc.stop(AudioCtx.currentTime + duration);
        }

        const CONFIG = {
            FLOOR_HEIGHT: 120,
            ELEVATOR_WIDTH: 70,
            ELEVATOR_HEIGHT: 90,
            MAX_FLOORS: 30,
            NUM_ELEVATORS: 2,
            SPEED: 1, 
            DOOR_SPEED: 0.1,
            SIM_SPEED: 10,
            LOSS_THRESHOLD: 25,
            WAIT_TIME_CAP: 300,
            CAPACITY: 8,
            EXEC_PATIENCE_BUFF: 0,
            DRONE_POINT_BUFF: 0
        };

        class EventEmitter {
            constructor() { this.listeners = {}; }
            on(event, callback) {
                if (!this.listeners[event]) this.listeners[event] = [];
                this.listeners[event].push(callback);
            }
            emit(event, ...args) {
                if (this.listeners[event]) { this.listeners[event].forEach(cb => cb(...args)); }
            }
        }

        class Elevator extends EventEmitter {
            constructor(id, x) {
                super();
                this.id = id;
                this.x = x;
                this.y = 0;
                this._currentFloor = 0;
                this.state = 'idle'; 
                this.doorOpen = 0; 
                this.passengers = [];
                this.capacity = CONFIG.CAPACITY;
                this.destinationQueue = [];
                this.direction = 0; 
                this.timer = 0;
            }

            get currentFloor() { return this._currentFloor; }
            maxPassengers() { return this.capacity; }
            currentWeight() { return this.passengers.reduce((sum, p) => sum + p.weight, 0); }
            loadFactor() { return this.currentWeight() / this.capacity; }
            
            goToFloor(floorNum) {
                if (!this.destinationQueue.includes(floorNum)) { this.destinationQueue.push(floorNum); }
            }

            stop() {
                this.destinationQueue = [];
                this.state = 'idle';
                this.direction = 0;
            }

            update(dt) {
                if (this.state === 'idle' && this.destinationQueue.length > 0) {
                    this.targetFloor = this.destinationQueue.shift();
                    this.state = 'moving';
                    this.direction = this.targetFloor > this._currentFloor ? 1 : -1;
                }

                if (this.state === 'moving') {
                    const targetY = this.targetFloor * CONFIG.FLOOR_HEIGHT;
                    const dy = targetY - this.y;
                    const moveStep = CONFIG.SPEED * CONFIG.FLOOR_HEIGHT * dt;
                    const oldFloor = Math.round(this.y / CONFIG.FLOOR_HEIGHT);
                    this.y += Math.sign(dy) * moveStep;
                    const newFloor = Math.round(this.y / CONFIG.FLOOR_HEIGHT);
                    if (oldFloor !== newFloor) { this.emit('passing_floor', newFloor, this.direction); }

                    if (Math.abs(dy) <= Math.abs(moveStep)) {
                        this.y = targetY;
                        this._currentFloor = this.targetFloor;
                        this.state = 'opening';
                        this.emit('stopped_at_floor', this._currentFloor);
                    }
                }

                if (this.state === 'opening') {
                    this.doorOpen += CONFIG.DOOR_SPEED * (dt * 60); 
                    if (this.doorOpen >= 1) {
                        this.doorOpen = 1;
                        this.state = 'open';
                        this.timer = 1.0; // minimum open time
                        this.boardingTimer = 0;
                        this.emit('floor_reached', this._currentFloor);
                    }
                }

                if (this.state === 'open') {
                    if (this.boardingTimer > 0) {
                        this.boardingTimer -= dt;
                    } else {
                        this.timer -= dt;
                        if (this.timer <= 0) { this.state = 'closing'; }
                    }
                }

                if (this.state === 'closing') {
                    this.doorOpen -= CONFIG.DOOR_SPEED * (dt * 60);
                    if (this.doorOpen <= 0) {
                        this.doorOpen = 0;
                        this.state = 'idle';
                        this.emit('idle');
                    }
                }
            }

            draw(ctx, worldY) {
                const screenY = ctx.canvas.height - (this.y + CONFIG.ELEVATOR_HEIGHT) + worldY;
                const beamGrad = ctx.createLinearGradient(this.x, 0, this.x + CONFIG.ELEVATOR_WIDTH, 0);
                beamGrad.addColorStop(0, 'rgba(0, 240, 255, 0)');
                beamGrad.addColorStop(0.5, 'rgba(0, 240, 255, 0.1)');
                beamGrad.addColorStop(1, 'rgba(0, 240, 255, 0)');
                ctx.fillStyle = beamGrad;
                ctx.fillRect(this.x, 0, CONFIG.ELEVATOR_WIDTH, ctx.canvas.height);

                ctx.shadowBlur = 15;
                ctx.shadowColor = this.state === 'moving' ? '#00f0ff' : 'transparent';
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(this.x, screenY, CONFIG.ELEVATOR_WIDTH, CONFIG.ELEVATOR_HEIGHT);
                ctx.strokeStyle = this.state === 'moving' ? '#00f0ff' : '#333';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, screenY, CONFIG.ELEVATOR_WIDTH, CONFIG.ELEVATOR_HEIGHT);
                ctx.shadowBlur = 0;

                const doorW = (CONFIG.ELEVATOR_WIDTH / 2) * (1 - this.doorOpen);
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(this.x, screenY, doorW, CONFIG.ELEVATOR_HEIGHT);
                ctx.fillRect(this.x + CONFIG.ELEVATOR_WIDTH - doorW, screenY, doorW, CONFIG.ELEVATOR_HEIGHT);
                ctx.strokeStyle = '#00f0ff';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x, screenY, doorW, CONFIG.ELEVATOR_HEIGHT);
                ctx.strokeRect(this.x + CONFIG.ELEVATOR_WIDTH - doorW, screenY, doorW, CONFIG.ELEVATOR_HEIGHT);

                ctx.fillStyle = '#00f0ff';
                ctx.font = 'bold 10px JetBrains Mono';
                ctx.textAlign = 'center';
                ctx.fillText(`LVL_${this._currentFloor}`, this.x + CONFIG.ELEVATOR_WIDTH/2, screenY + 15);
                ctx.fillText(`${this.passengers.length}/${this.capacity}`, this.x + CONFIG.ELEVATOR_WIDTH/2, screenY + CONFIG.ELEVATOR_HEIGHT - 5);
            }
        }

        class Person {
            constructor(type, startFloor, targetFloor) {
                this.type = type; // 'EXEC', 'WORKER', 'DRONE'
                this.startFloor = startFloor;
                this.targetFloor = targetFloor;
                this.state = 'waiting'; 
                this.x = 20 + Math.random() * 80;
                this.waitTimer = 0;
                this.elevator = null;
                this.id = Math.random().toString(36).substr(2, 9);
                
                switch(type) {
                    case 'EXEC':
                        this.color = '#ff00c8';
                        this.weight = 2;
                        this.maxWait = 15 + CONFIG.EXEC_PATIENCE_BUFF;
                        this.reward = 20;
                        this.penalty = 50;
                        this.tier = 'EXEC';
                        break;
                    case 'WORKER':
                        this.color = '#00f0ff';
                        this.weight = 1;
                        this.maxWait = 30;
                        this.reward = 10;
                        this.penalty = 20;
                        this.tier = 'WORKER';
                        break;
                    case 'DRONE':
                        this.color = '#39ff14';
                        this.weight = 0.5;
                        this.maxWait = 60;
                        this.reward = 5 + CONFIG.DRONE_POINT_BUFF;
                        this.penalty = 5;
                        this.tier = 'DRONE';
                        break;
                }
            }

            update(dt) {
                if (this.state === 'waiting') {
                    this.waitTimer += dt;
                }
            }

            draw(ctx, worldY) {
                if (this.state === 'inside') return;
                const y = ctx.canvas.height - (this.startFloor * CONFIG.FLOOR_HEIGHT + 15) + worldY;
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                
                if (this.type === 'EXEC') {
                    // Sharp glossy diamond/avatar
                    ctx.beginPath();
                    ctx.moveTo(this.x, y - 8);
                    ctx.lineTo(this.x + 6, y);
                    ctx.lineTo(this.x, y + 8);
                    ctx.lineTo(this.x - 6, y);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'WORKER') {
                    // Modest uniform avatar
                    ctx.fillRect(this.x - 4, y - 6, 8, 12);
                } else {
                    // Small drone avatar
                    ctx.beginPath();
                    ctx.arc(this.x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillRect(this.x - 6, y - 1, 12, 2); // drone arms
                }
                
                ctx.shadowBlur = 0;
            }
        }

        class Floor extends EventEmitter {
            constructor(level) {
                super();
                this.level = level;
                this.tier = level < 10 ? 'DRONE_ZONE' : (level < 25 ? 'WORKER_HUB' : 'EXEC_SUITE');
                this.people = [];
            }
            floorNum() { return this.level; }
            waitingPassengers() {
                return this.people.filter(p => p.state === 'waiting').map(p => ({
                    destinationFloor: p.targetFloor, class: p.tier, timeWaiting: p.waitTimer
                }));
            }
        }

        class World extends EventEmitter {
            constructor(canvas) {
                super();
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.elevators = [];
                this.floors = [];
                this.people = [];
                this.compliance = 100;
                this.credits = 0;
                this.transported = 0;
                this.worldY = 0;
                this.mode = 'manual';
                this.pulse = 0;
                this.totalWaitTime = 0;
                this.lastDeliveryTime = 0;
                this.streakCount = 0;
                this.highScore = localStorage.getItem('subnet_lift_highscore') || 0;
                
                this.upgrades = JSON.parse(localStorage.getItem('subnet_lift_upgrades')) || {
                    speed: 0,
                    capacity: 0,
                    acceleration: 0,
                    extraElevators: 0,
                    vipPriority: 0,
                    droneReplicator: 0
                };

                this.applyUpgrades();
                
                for (let i = 0; i < CONFIG.NUM_ELEVATORS; i++) {
                    this.elevators.push(new Elevator(i, 160 + i * 150));
                }

                for (let i = 0; i < CONFIG.MAX_FLOORS; i++) {
                    this.floors.push(new Floor(i));
                }

                this.initUI();
                this.initInput();
                
                const savedCode = localStorage.getItem('subnet_lift_code');
                if (savedCode) document.getElementById('code-editor').value = savedCode;
                document.getElementById('high-score-value').innerText = this.highScore;
            }

            initInput() {
                let isDragging = false;
                let lastY = 0;
                this.canvas.addEventListener('mousedown', e => { isDragging = true; lastY = e.clientY; });
                window.addEventListener('mousemove', e => {
                    if (isDragging) {
                        const dy = e.clientY - lastY;
                        this.worldY += dy;
                        lastY = e.clientY;
                        this.clampScroll();
                    }
                });
                window.addEventListener('mouseup', () => isDragging = false);
                this.canvas.addEventListener('wheel', e => {
                    this.worldY -= e.deltaY;
                    this.clampScroll();
                }, { passive: true });
                
                this.canvas.addEventListener('click', e => {
                    const rect = this.canvas.getBoundingClientRect();
                    const mx = e.clientX - rect.left;
                    const my = e.clientY - rect.top;
                    this.people.forEach(p => {
                        if (p.state === 'waiting') {
                            const py = this.canvas.height - (p.startFloor * CONFIG.FLOOR_HEIGHT + 15) + this.worldY;
                            const dist = Math.sqrt((mx - p.x)**2 + (my - py)**2);
                            if (dist < 20) { this.callElevator(p.startFloor); }
                        }
                    });
                });
            }

            clampScroll() {
                const maxScroll = (CONFIG.MAX_FLOORS * CONFIG.FLOOR_HEIGHT) - this.canvas.height + 100;
                this.worldY = Math.min(0, Math.max(-maxScroll, this.worldY));
            }

            initUI() {
                const container = document.getElementById('floor-list-container');
                container.innerHTML = '';
                for (let i = CONFIG.MAX_FLOORS - 1; i >= 0; i--) {
                    const row = document.createElement('div');
                    row.className = 'floor-row';
                    row.id = `floor-row-${i}`;
                    row.innerHTML = `
                        <div class="floor-num">${i}</div>
                        <div class="waiting-dots" id="waiting-dots-${i}"></div>
                        <button class="btn-small" style="position: absolute; right: 10px;" onclick="world.callElevator(${i})">CALL</button>
                    `;
                    container.appendChild(row);
                }

                this.updateModeUI();
                this.resize();
                window.addEventListener('resize', () => this.resize());
                document.getElementById('btn-apply').onclick = () => this.applyScript();
            }

            resize() {
                const col = document.getElementById('shaft-column');
                this.canvas.width = col.clientWidth;
                this.canvas.height = col.clientHeight;
            }

            setSimSpeed(speed) {
                CONFIG.SIM_SPEED = speed;
                document.querySelectorAll('.speed-toggles button').forEach(b => b.classList.remove('active'));
                document.getElementById(`speed-${speed}`).classList.add('active');
            }

            confirmModeSwitch() {
                const target = this.mode === 'manual' ? 'coding' : 'manual';
                if (confirm(`SWITCH TO ${target.toUpperCase()} MODE?`)) {
                    this.mode = target;
                    localStorage.setItem('subnet_lift_mode', target);
                    this.updateModeUI();
                }
            }

            updateModeUI() {
                const isCoding = this.mode === 'coding';
                document.getElementById('coding-panel').style.display = isCoding ? 'flex' : 'none';
                document.getElementById('manual-controls').style.display = isCoding ? 'none' : 'block';
                document.getElementById('mode-switch-btn').innerText = isCoding ? 'SWITCH_TO_MANUAL' : 'SWITCH_TO_LOGIC';
            }

            // Legacy setMode replaced by updateModeUI

            applyUpgrades() {
                const speedValues = [1.0, 0.6, 0.4, 0.25, 0.15];
                const capacityValues = [8, 10, 12, 14, 16];
                
                CONFIG.SPEED = speedValues[this.upgrades.speed];
                CONFIG.CAPACITY = capacityValues[this.upgrades.capacity];
                CONFIG.DOOR_SPEED = this.upgrades.acceleration ? 0.13 : 0.1;
                CONFIG.NUM_ELEVATORS = 2 + this.upgrades.extraElevators;
                CONFIG.EXEC_PATIENCE_BUFF = this.upgrades.vipPriority ? 5 : 0;
                CONFIG.DRONE_POINT_BUFF = this.upgrades.droneReplicator ? 1 : 0;
            }

            toggleShop(show) {
                const overlay = document.getElementById('shop-overlay');
                overlay.style.display = show ? 'flex' : 'none';
                if (show) this.renderShop();
            }

            renderShop() {
                const grid = document.getElementById('shop-grid');
                grid.innerHTML = '';
                
                const items = [
                    { id: 'speed', name: 'Elevator Speed', desc: 'Reduce floor travel time.', levels: 5, costs: [100, 300, 800, 1500, 3000] },
                    { id: 'capacity', name: 'Max Capacity', desc: 'Increase total weight capacity.', levels: 5, costs: [80, 250, 700, 1400, 2800] },
                    { id: 'acceleration', name: 'Door Boost', desc: 'Reduce open/close time by 30%.', levels: 1, costs: [500] },
                    { id: 'extraElevators', name: 'Extra Elevator', desc: 'Deploy an additional lift unit.', levels: 2, costs: [2000, 5000] },
                    { id: 'vipPriority', name: 'VIP Priority', desc: 'Executives get +5s patience.', levels: 1, costs: [1200] },
                    { id: 'droneReplicator', name: 'Drone Replicator', desc: 'Drones yield +1 extra point.', levels: 1, costs: [1000] }
                ];

                items.forEach(item => {
                    const currentLevel = this.upgrades[item.id];
                    const isMax = currentLevel >= item.levels;
                    const cost = isMax ? 'MAXED' : item.costs[currentLevel];
                    
                    const card = document.createElement('div');
                    card.className = 'shop-card';
                    card.innerHTML = `
                        <h4>${item.name.toUpperCase()}</h4>
                        <p>${item.desc}</p>
                        <div class="label">LEVEL: ${currentLevel} / ${item.levels}</div>
                        <div class="cost">${isMax ? 'MAXED' : cost + ' CR'}</div>
                        <button class="btn" ${isMax ? 'disabled' : ''} onclick="world.confirmPurchase('${item.id}', ${cost})">PURCHASE</button>
                    `;
                    grid.appendChild(card);
                });
            }

            confirmPurchase(id, cost) {
                if (this.credits < cost) { alert("INSUFFICIENT_FUNDS"); return; }
                const modal = document.getElementById('confirm-modal');
                const title = document.getElementById('confirm-title');
                const desc = document.getElementById('confirm-desc');
                const yesBtn = document.getElementById('confirm-yes');
                
                modal.style.display = 'flex';
                title.innerText = `AUTHORIZE_${id.toUpperCase()}`;
                desc.innerText = `Proceed with transaction of ${cost} CR?`;
                yesBtn.onclick = () => {
                    this.credits -= cost;
                    this.upgrades[id]++;
                    localStorage.setItem('subnet_lift_upgrades', JSON.stringify(this.upgrades));
                    modal.style.display = 'none';
                    this.applyUpgrades();
                    this.renderShop();
                    playSound(660, 'square', 0.2, 0.1);
                    if (id === 'extraElevators') location.reload(); // Reload to re-init elevators
                };
            }

            dispatchAll() {
                const idleElevators = this.elevators.filter(e => e.state === 'idle');
                const waitingFloors = this.floors.filter(f => f.people.some(p => p.state === 'waiting'));
                waitingFloors.sort((a, b) => {
                    const aWait = Math.max(...a.people.filter(p => p.state === 'waiting').map(p => p.waitTimer));
                    const bWait = Math.max(...b.people.filter(p => p.state === 'waiting').map(p => p.waitTimer));
                    return bWait - aWait;
                });
                idleElevators.forEach((e, i) => { if (waitingFloors[i]) e.goToFloor(waitingFloors[i].level); });
            }

            update(dt) {
                if (this.gameOver) return;
                this.pulse = (this.pulse + 0.05) % (Math.PI * 2);
                if (this.mode === 'coding' && this.userUpdate) { try { this.userUpdate(dt, this.elevators, this.floors); } catch(e) {} }
                this.elevators.forEach(e => {
                    e.update(dt);
                    if (e.state === 'opening') {
                        const btn = document.getElementById(`floor-btn-${e.currentFloor}`);
                        if (btn.classList.contains('active')) btn.classList.remove('active');
                    }
                    if (this.mode === 'manual') {
                        const ctrl = document.getElementById(`elevator-ctrl-${e.id}`);
                        ctrl.innerHTML = `
                            <div class="label" style="color:#fff">ELEVATOR_${e.id}</div>
                            <div style="font-size:10px">FLOOR: ${e.currentFloor}</div>
                            <div style="font-size:10px">STATE: ${e.state.toUpperCase()}</div>
                            <div style="font-size:10px">LOAD: ${Math.round(e.loadFactor()*100)}%</div>
                            <button class="control-btn" onclick="world.setTarget(${e.id})">TARGET</button>
                            <button class="control-btn" onclick="world.goNearest(${e.id})">NEAREST</button>
                            <button class="control-btn" onclick="world.stopElevator(${e.id})">IDLE</button>
                        `;
                    }
                });

                let maxWait = 0;
                this.people.forEach(p => {
                    p.update(dt);
                    if (p.state === 'waiting') {
                        if (p.waitTimer > p.maxWait) {
                            p.state = 'done';
                            this.credits -= p.penalty;
                            playSound(220, 'sawtooth', 0.5, 0.1);
                        } else {
                            maxWait = Math.max(maxWait, p.waitTimer);
                            const elevator = this.elevators.find(e => {
                                if (e.currentFloor !== p.startFloor || e.state !== 'open' || e.boardingTimer > 0) return false;
                                if (e.currentWeight() + p.weight > e.capacity) return false;
                                // Direction sensitive boarding
                                if (e.direction === 0) return true;
                                const pDir = p.targetFloor > p.startFloor ? 1 : -1;
                                return pDir === e.direction;
                            });
                            if (elevator) {
                                p.state = 'inside';
                                p.elevator = elevator;
                                elevator.passengers.push(p);
                                elevator.boardingTimer = 0.5; // 0.5s real time boarding
                                elevator.emit('floor_button_pressed', p.targetFloor);
                                if (this.mode === 'manual') elevator.goToFloor(p.targetFloor);
                            }
                        }
                    }
                    if (p.state === 'inside' && p.elevator.currentFloor === p.targetFloor && p.elevator.state === 'open') {
                        p.state = 'done';
                        this.transported++;
                        this.totalWaitTime += p.waitTimer;

                        // Streak Logic
                        const now = Date.now();
                        if (now - this.lastDeliveryTime < 5000) {
                            this.streakCount++;
                        } else {
                            this.streakCount = 0;
                        }
                        this.lastDeliveryTime = now;
                        const streakMultiplier = 1 + (this.streakCount * 0.1);

                        // Base Reward & Time Bonus
                        let reward = p.reward;
                        if (p.waitTimer < p.maxWait / 2) {
                            reward *= 1.5; // 50% Bonus
                        }

                        // Wait Time Penalty
                        if (p.waitTimer > p.maxWait / 2) {
                            const penalty = Math.floor(p.waitTimer - p.maxWait / 2);
                            reward = Math.max(0, reward - penalty);
                        }

                        this.credits += Math.floor(reward * streakMultiplier);
                        
                        // Update High Score
                        if (this.credits > this.highScore) {
                            this.highScore = this.credits;
                            localStorage.setItem('subnet_lift_highscore', this.highScore);
                            document.getElementById('high-score-value').innerText = this.highScore;
                        }

                        p.elevator.passengers = p.elevator.passengers.filter(pass => pass !== p);
                    }
                });

                this.people = this.people.filter(p => p.state !== 'done');
                if (Math.random() < 0.02 * dt * 60) this.spawnPerson();

                const waitingCount = this.people.filter(p => p.state === 'waiting').length;
                document.getElementById('load-value').innerText = Math.round((waitingCount/CONFIG.LOSS_THRESHOLD)*100) + "%";
                document.getElementById('credits-value').innerText = this.credits;
                
                // Update Multi-Stats
                const avgWait = this.transported > 0 ? (this.totalWaitTime / this.transported) : 0;
                document.getElementById('avg-wait-value').innerText = avgWait.toFixed(1) + "s";
                
                const streakDisplay = 1 + (this.streakCount * 0.1);
                const streakEl = document.getElementById('streak-value');
                streakEl.innerText = streakDisplay.toFixed(1) + "x";
                streakEl.style.textShadow = this.streakCount > 0 ? `0 0 10px var(--secondary)` : 'none';

                this.compliance = Math.max(0, 100 - (maxWait / CONFIG.WAIT_TIME_CAP) * 100);
                document.getElementById('compliance-value').innerText = Math.round(this.compliance) + "%";
                if (this.compliance <= 0 || waitingCount >= CONFIG.LOSS_THRESHOLD) this.endGame();
            }

            setTarget(id) {
                const floor = prompt("Enter target floor (0-29):");
                if (floor !== null) this.elevators[id].goToFloor(parseInt(floor));
            }

            goNearest(id) {
                const e = this.elevators[id];
                const waiting = this.floors.filter(f => f.people.some(p => p.state === 'waiting'));
                if (waiting.length > 0) {
                    waiting.sort((a, b) => Math.abs(a.level - e.currentFloor) - Math.abs(b.level - e.currentFloor));
                    e.goToFloor(waiting[0].level);
                }
            }

            stopElevator(id) { this.elevators[id].stop(); }

            callElevator(floorIndex) {
                if (this.gameOver) return;
                if (this.mode === 'manual') {
                    let nearest = this.elevators[0];
                    let minDist = Infinity;
                    this.elevators.forEach(e => {
                        const dist = Math.abs(e.currentFloor - floorIndex);
                        if (dist < minDist) { minDist = dist; nearest = e; }
                    });
                    nearest.goToFloor(floorIndex);
                }
                const btn = document.getElementById(`floor-btn-${floorIndex}`);
                if (!btn.classList.contains('active')) { btn.classList.add('active'); playSound(440, 'square', 0.05, 0.02); }
                this.floors[floorIndex].emit('button_pressed');
            }

            spawnPerson() {
                const rand = Math.random();
                let type, start, target;

                if (rand < 0.15) { // 15% EXECUTIVES
                    type = 'EXEC';
                    start = Math.random() < 0.5 ? Math.floor(Math.random() * 6) : 25 + Math.floor(Math.random() * 5);
                    target = Math.random() < 0.8 ? 20 + Math.floor(Math.random() * 10) : Math.floor(Math.random() * 6);
                    while (target === start) target = Math.floor(Math.random() * 6);
                } else if (rand < 0.5) { // 35% WORKERS
                    type = 'WORKER';
                    start = 6 + Math.floor(Math.random() * 14);
                    target = Math.floor(Math.random() * CONFIG.MAX_FLOORS);
                    while (target === start) target = Math.floor(Math.random() * CONFIG.MAX_FLOORS);
                } else { // 50% DRONES
                    type = 'DRONE';
                    start = Math.floor(Math.random() * 25);
                    // heavily skewed to lower half
                    target = Math.floor(Math.pow(Math.random(), 2) * CONFIG.MAX_FLOORS);
                    while (target === start) target = Math.floor(Math.random() * CONFIG.MAX_FLOORS);
                }

                const p = new Person(type, start, target);
                this.people.push(p);
                this.floors[start].people.push(p);
                this.floors[start].emit(target > start ? 'up_button_pressed' : 'down_button_pressed');
            }

            applyScript() {
                const code = document.getElementById('code-editor').value;
                localStorage.setItem('subnet_lift_code', code);
                try {
                    this.elevators.forEach(e => e.listeners = {});
                    this.floors.forEach(f => f.listeners = {});
                    const script = eval(`(${code})`);
                    if (script.init) script.init(this.elevators, this.floors);
                    this.userUpdate = script.update;
                    console.log("LOGISTICS OVERRIDE ACTIVE.");
                } catch (e) { alert("ERROR: " + e.message); }
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                const worldY = this.worldY;
                const startX = (this.canvas.width - (CONFIG.NUM_ELEVATORS * 150)) / 2;

                // Draw Shafts
                this.elevators.forEach((e, i) => {
                    const x = startX + i * 150;
                    ctx.strokeStyle = 'rgba(0, 240, 255, 0.1)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x - 5, 0, CONFIG.ELEVATOR_WIDTH + 10, this.canvas.height);
                    
                    // Elevator Box
                    const ey = this.canvas.height - (e.y + CONFIG.ELEVATOR_HEIGHT) + worldY;
                    ctx.fillStyle = 'rgba(13, 13, 13, 0.9)';
                    ctx.strokeStyle = e.state === 'idle' ? 'var(--primary)' : 'var(--accent)';
                    ctx.lineWidth = 3;
                    ctx.fillRect(x, ey, CONFIG.ELEVATOR_WIDTH, CONFIG.ELEVATOR_HEIGHT);
                    ctx.strokeRect(x, ey, CONFIG.ELEVATOR_WIDTH, CONFIG.ELEVATOR_HEIGHT);

                    // Passengers inside as dots
                    e.passengers.forEach((p, pi) => {
                        const px = x + 10 + (pi % 5) * 10;
                        const py = ey + 10 + Math.floor(pi / 5) * 10;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(px, py, 3, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    // Elevator Label
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px JetBrains Mono';
                    ctx.fillText(`E${e.id}`, x + 5, ey + CONFIG.ELEVATOR_HEIGHT - 5);
                    ctx.fillText(e.state.toUpperCase(), x + 5, ey + CONFIG.ELEVATOR_HEIGHT - 15);
                });

                // Update Floor Column Indicators
                this.floors.forEach(f => {
                    const row = document.getElementById(`floor-row-${f.level}`);
                    if (!row) return;
                    
                    const hasElevator = this.elevators.some(e => e.currentFloor === f.level && e.state === 'open');
                    row.classList.toggle('active', hasElevator);

                    const dotContainer = document.getElementById(`waiting-dots-${f.level}`);
                    dotContainer.innerHTML = '';
                    f.people.filter(p => p.state === 'waiting').forEach(p => {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        dot.style.color = p.color;
                        dot.style.backgroundColor = p.color;
                        dotContainer.appendChild(dot);
                    });
                });

                // HUD Stats
                const minutes = Math.floor(this.time / 60);
                const seconds = Math.floor(this.time % 60);
                document.getElementById('clock-display').innerText = `TIME: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                const avgWait = this.transported > 0 ? (this.totalWaitTime / this.transported) : 0;
                document.getElementById('avg-wait-value').innerText = avgWait.toFixed(1) + "s";
                
                const streakDisplay = 1 + (this.streakCount * 0.1);
                const streakEl = document.getElementById('streak-value');
                streakEl.innerText = streakDisplay.toFixed(1) + "x";
                streakEl.style.textShadow = this.streakCount > 0 ? `0 0 10px var(--secondary)` : 'none';
                
                const waitingCount = this.people.filter(p => p.state === 'waiting').length;
                document.getElementById('load-value').innerText = Math.round((waitingCount/CONFIG.LOSS_THRESHOLD)*100) + "%";
                document.getElementById('credits-value').innerText = this.credits + " CR";
                document.getElementById('compliance-value').innerText = Math.round(this.compliance) + "%";
            }

            endGame() {
                this.gameOver = true;
                const overlay = document.createElement('div');
                overlay.style = `position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,0,200,0.2);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:#fff;font-family:'Orbitron'`;
                overlay.innerHTML = `
                    <h1 style="font-size:48px;margin-bottom:20px;color:#ff00c8;text-shadow:0 0 20px #ff00c8">ORDER_BREACHED</h1>
                    <p style="font-size:18px;margin-bottom:40px;color:#00f0ff">The vertical order has collapsed. You have been recycled.</p>
                    <div style="font-size:24px;margin-bottom:40px">UNITS_PROCESSED: ${this.transported}</div>
                    <button class="btn btn-secondary" onclick="location.reload()">RE-INITIALIZE</button>
                `;
                document.body.appendChild(overlay);
                playSound(110, 'sawtooth', 1.5, 0.2);
            }
        }

        let world;
        window.onload = () => {
            const canvas = document.getElementById('render-canvas');
            world = new World(canvas);
            const savedMode = localStorage.getItem('subnet_lift_mode') || 'manual';
            world.mode = savedMode;
            world.updateModeUI();

            function loop() {
                const dt = (1/60) * CONFIG.SIM_SPEED;
                world.update(dt);
                world.draw();
                requestAnimationFrame(loop);
            }
            loop();
        };
    </script>
</body>
</html>
