<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SUBNET LIFT – Vertical Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111122;
      --panel: #15152a;
      --border: #2a2a45;
      --text: #c8ccd6;
      --dim: #6b6f82;
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.6);
      --exec: #ff2d95;
      --worker: #00c8ff;
      --drone: #3cdd4b;
      --warning: #ffb800;
      --danger: #ff4444;
      --btn-bg: #1e1e35;
      --btn-hover: #2a2a50;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Orbitron', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font-mono);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }

    /* subtle scanlines */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* top bar */
    #header {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }
    #header .logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--accent);
      text-shadow: 0 0 14px var(--accent-glow);
      letter-spacing: 3px;
    }
    .mode-badge {
      font-size: 0.7rem;
      background: #0f0f1e;
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 4px;
      font-family: var(--font-display);
      color: var(--dim);
      letter-spacing: 1px;
    }
    .mode-badge.active-mode {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* main layout */
    #main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* floor panel (left) */
    #floor-panel {
      width: 160px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 8px 0;
      flex-shrink: 0;
    }
    .floor-entry {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 4px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
      cursor: pointer;
      gap: 6px;
    }
    .floor-entry:hover {
      background: rgba(255,255,255,0.04);
    }
    .floor-num {
      font-family: var(--font-display);
      font-size: 0.8rem;
      color: var(--dim);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }
    .wait-indicator {
      display: flex;
      gap: 3px;
      flex: 1;
      align-items: center;
    }
    .wait-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: #333;
    }
    .wait-dot.exec { background: var(--exec); box-shadow: 0 0 6px var(--exec); }
    .wait-dot.worker { background: var(--worker); box-shadow: 0 0 6px var(--worker); }
    .wait-dot.drone { background: var(--drone); box-shadow: 0 0 6px var(--drone); }
    .call-btn {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--font-display);
      font-size: 0.6rem;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .call-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .call-btn.called {
      border-color: var(--warning);
      color: var(--warning);
      animation: pulse 0.7s infinite;
    }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 5px var(--warning); } 50% { box-shadow: 0 0 18px var(--warning); } }

    /* shaft area */
    #shaft-area {
      flex: 1;
      position: relative;
      background: radial-gradient(ellipse at center top, #0d0d20 0%, #08080f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      padding: 20px 40px;
    }
    .shaft {
      width: 70px;
      height: 100%;
      position: relative;
      background: rgba(12,12,24,0.6);
      border: 1px solid #222244;
      border-radius: 6px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
    }
    .elevator-car {
      position: absolute;
      left: 5px;
      right: 5px;
      height: 52px;
      background: rgba(10,20,30,0.9);
      border: 2px solid var(--accent);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: var(--font-display);
      font-size: 0.55rem;
      transition: box-shadow 0.2s;
      cursor: pointer;
      z-index: 2;
    }
    .elevator-car .car-id {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.7rem;
    }
    .elevator-car .car-stats {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      color: #aaa;
    }
    .elevator-car.moving {
      border-style: dashed;
      animation: buzz 0.4s infinite;
    }
    @keyframes buzz { 0%,100% { box-shadow: 0 0 8px var(--accent-glow); } 50% { box-shadow: 0 0 20px var(--accent-glow); } }
    .elevator-car.exec-presence {
      border-color: var(--exec);
    }

    /* right hud */
    #hud {
      width: 250px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 14px;
      overflow-y: auto;
    }
    .hud-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
    }
    .hud-label {
      font-family: var(--font-display);
      font-size: 0.55rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .hud-value {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent-glow);
    }
    .danger-value {
      color: var(--danger);
      text-shadow: 0 0 12px var(--danger);
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .btn {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 1px;
      padding: 10px;
      border: 1px solid var(--border);
      background: var(--btn-bg);
      color: var(--dim);
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.2s;
      text-align: center;
      width: 100%;
    }
    .btn:hover {
      background: var(--btn-hover);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .btn.primary {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn.warning {
      border-color: var(--warning);
      color: var(--warning);
    }
    .btn.danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    .speed-group {
      display: flex;
      gap: 4px;
    }
    .speed-btn {
      flex: 1;
      padding: 6px;
      font-size: 0.6rem;
    }
    .speed-btn.active {
      background: var(--accent);
      color: black;
      border-color: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
    }
    /* modals */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal.hidden { display: none; }
    .modal-content {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    .modal-content h2 {
      font-family: var(--font-display);
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .modal-content textarea {
      width: 100%;
      height: 200px;
      background: #050510;
      color: var(--drone);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      padding: 12px;
      margin: 12px 0;
      resize: vertical;
    }
    .console {
      background: #020208;
      color: #aaa;
      height: 80px;
      text-align: left;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 8px;
      overflow-y: auto;
      border: 1px solid var(--border);
      margin: 8px 0;
    }
    .shop-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      gap: 8px;
    }
    .shop-item .info { flex:1; }
    .shop-item .name { font-family: var(--font-display); color: var(--accent); font-size: 0.7rem; }
    .shop-item .desc { font-size: 0.6rem; color: #888; }
    .shop-item .cost { color: var(--warning); font-family: var(--font-display); }
    .shop-item button {
      padding: 4px 10px;
      font-size: 0.6rem;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      color: var(--accent);
      cursor: pointer;
      border-radius: 4px;
    }
    .shop-item button:hover { border-color: var(--accent); }
</head>
<body>
  <div id="header">
    <span class="logo">SUBNET LIFT</span>
    <span class="mode-badge active-mode" id="mode-indicator">MANUAL</span>
    <span style="flex:1;"></span>
    <span style="font-family:monospace;font-size:0.7rem;color:#666;">v2.0 // VERTICAL_ORDER</span>
  </div>
  <div id="main-container">
    <div id="floor-panel"></div>
    <div id="shaft-area"></div>
    <!-- HUD -->
    <div id="hud">
      <div class="hud-group">
        <div class="hud-label">COMPLIANCE</div>
        <div class="hud-value" id="compliance-val">100%</div>
      </div>
      <div class="hud-group">
        <div class="hud-label">CREDITS</div>
        <div class="hud-value" id="credits-val">0 CR</div>
      </div>
      <div class="hud-group">
        <div class="hud-label">STREAK</div>
        <div class="hud-value" id="streak-val">1.0x</div>
      </div>
      <div class="hud-group">
        <div class="hud-label">AVG WAIT</div>
        <div class="hud-value" id="avg-wait-val">0s</div>
      </div>
      <div class="hud-group">
        <div class="hud-label">UNSERVED</div>
        <div class="hud-value" id="unserved-val">0 / 20</div>
      </div>
      <div class="hud-group">
        <div class="hud-label">HIGH SCORE</div>
        <div class="hud-value" id="highscore-val">0</div>
      </div>
      <div class="hud-group">
        <div class="hud-label">SIM SPEED</div>
        <div class="speed-group">
          <button class="btn speed-btn active" data-speed="1">1X</button>
          <button class="btn speed-btn" data-speed="5">5X</button>
          <button class="btn speed-btn" data-speed="10">10X</button>
        </div>
      </div>
      <button class="btn primary" id="shop-btn">🛒 UPGRADE SHOP</button>
      <button class="btn" id="switch-mode-btn">💻 SWITCH TO CODE</button>
      <button class="btn warning" id="dispatch-btn">📡 DISPATCH ALL</button>
      <button class="btn danger" id="reset-btn">🔄 RESET SIM</button>
    </div>
  </div>

  <!-- Modals -->
  <div class="modal hidden" id="shop-modal">
    <div class="modal-content">
      <h2>INFRASTRUCTURE SHOP</h2>
      <div id="shop-items"></div>
      <p style="margin:10px 0;">Credits: <span id="shop-credits">0</span></p>
      <button class="btn" id="close-shop">CLOSE</button>
    </div>
  </div>

  <div class="modal hidden" id="code-modal">
    <div class="modal-content" style="max-width:600px;">
      <h2>LOGISTICS CODE</h2>
      <p style="font-size:0.7rem;">Define init(elevators, floors) and update(dt, elevators, floors)</p>
      <textarea id="code-editor">// Example
function init(elevators, floors) {
  elevators.forEach(e => {
    e.on("idle", () => {
      for (let f of floors) {
        if (f.waitingPassengers().length > 0) {
          e.goToFloor(f.level);
          break;
        }
      }
    });
  });
}
function update(dt, elevators, floors) { }</textarea>
      <div class="console" id="code-console">> Ready.</div>
      <button class="btn primary" id="deploy-btn">DEPLOY</button>
      <button class="btn danger" id="stop-code-btn">STOP SCRIPT</button>
      <button class="btn" id="close-code">CLOSE</button>
    </div>
  </div>

  <div class="modal hidden" id="gameover-modal">
    <div class="modal-content">
      <h2 style="color:var(--danger);">NETWORK COLLAPSE</h2>
      <p id="gameover-msg"></p>
      <p>Final Score: <span id="final-score" style="color:var(--accent);font-size:1.5rem;">0</span></p>
      <button class="btn primary" id="restart-btn">RESTART</button>
    </div>
  </div>
  <script>
    // ──────────────────────────────────
    // CORE GAME ENGINE (identical logic, improved UI bindings)
    // ──────────────────────────────────
    (() => {
      const TOTAL_FLOORS = 30;
      const MAX_ELEVATORS = 4;
      const INITIAL_ELEVATORS = 2;
      const BASE_SPEED = 1.0;
      const DOOR_TIME = 0.5;
      const MAX_WAITING = 40;
      const MAX_UNSERVED = 20;
      const WARN_THRESHOLD = 25;

      // State
      let gameMode = 'manual'; // 'manual' | 'code'
      let score = 0, credits = 0, streakCount = 0, lastDelivery = -10;
      let totalDelivered = 0, totalWait = 0, unserved = 0;
      let highScore = parseInt(localStorage.getItem('subnetHighScore') || '0');
      let gameSpeed = 1, gameTime = 0, spawnTimer = 0;
      let difficulty = 1.0;
      let allPassengers = [];
      let elevators = [], floorsData = [];
      let codeActive = false, userScript = null;
      let upgrades = JSON.parse(localStorage.getItem('subnetUpgrades') || '{"speed":0,"capacity":0,"door":false,"elev3":false,"elev4":false,"vip":false,"drone":false}');

      // DOM
      const floorPanel = document.getElementById('floor-panel');
      const shaftArea = document.getElementById('shaft-area');
      const complianceEl = document.getElementById('compliance-val');
      const creditsEl = document.getElementById('credits-val');
      const streakEl = document.getElementById('streak-val');
      const avgWaitEl = document.getElementById('avg-wait-val');
      const unservedEl = document.getElementById('unserved-val');
      const highscoreEl = document.getElementById('highscore-val');
      const modeIndicator = document.getElementById('mode-indicator');
      const dispatchBtn = document.getElementById('dispatch-btn');

      // Helper: upgrade values
      function getSpeed() { return [1.0,0.6,0.4,0.25,0.15][upgrades.speed] || 1.0; }
      function getCapacity() { return [8,10,12,14,16][upgrades.capacity] || 8; }
      function getDoor() { return upgrades.door ? DOOR_TIME*0.7 : DOOR_TIME; }
      function getTotalElevators() { let n=INITIAL_ELEVATORS; if(upgrades.elev3)n++; if(upgrades.elev4)n++; return Math.min(n,MAX_ELEVATORS); }
      function getExecPat() { return upgrades.vip ? 20 : 15; }
      function droneBonus() { return upgrades.drone ? 1 : 0; }

      class Passenger {
        constructor(floor,dest,cls) {
          this.spawn=floor; this.dest=dest; this.cls=cls; this.spawnTime=gameTime;
        }
        get patience() { return this.cls==='exec'?getExecPat():this.cls==='worker'?30:60; }
        get weight() { return this.cls==='exec'?2:this.cls==='worker'?1:0.5; }
        get reward() { return this.cls==='exec'?20:this.cls==='worker'?10:5+droneBonus(); }
        get waitTime() { return gameTime-this.spawnTime; }
      }

      class Elevator {
        constructor(idx) {
          this.idx=idx; this.floor=0; this.queue=[]; this.state='idle'; this.pass=[];
          this.doorTimer=0; this.dir=0; this.handlers={};
        }
        get maxCap() { return getCapacity(); }
        loadWeight() { return this.pass.reduce((s,p)=>s+p.weight,0); }
        canBoard(p) { return this.loadWeight()+p.weight <= this.maxCap; }
        on(ev,cb) { if(!this.handlers[ev]) this.handlers[ev]=[]; this.handlers[ev].push(cb); }
        trigger(ev,data) { (this.handlers[ev]||[]).forEach(cb=>{try{cb(data)}catch(e){}}); }
        goToFloor(f) {
          f=Math.max(0,Math.min(TOTAL_FLOORS-1,Math.floor(f)));
          if(!this.queue.includes(f)) this.queue.push(f);
          if(this.state==='idle') this.processQueue();
        }
        stop() { this.queue=[]; this.state='idle'; this.dir=0; this.trigger('idle'); }
        processQueue() {
          if(this.queue.length===0) { this.state='idle'; this.trigger('idle'); return; }
          let target=this.queue.shift();
          if(Math.abs(target-this.floor)<0.01) { this.arrive(); }
          else { this.dir=target>this.floor?1:-1; this.state=this.dir>0?'moving_up':'moving_down'; }
        }
        arrive() {
          this.floor=Math.round(this.floor); this.state='doors_open'; this.doorTimer=getDoor();
          this.trigger('stopped_at_floor',this.floor);
        }
        update(dt) {
          if(this.state==='doors_open'||this.state==='doors_close') {
            this.doorTimer-=dt;
            if(this.doorTimer<=0) {
              if(this.state==='doors_open') { this.loadUnload(); this.state='doors_close'; this.doorTimer=getDoor(); }
              else { this.state='idle'; this.trigger('idle'); this.processQueue(); }
            }
            return;
          }
          if(this.state==='moving_up'||this.state==='moving_down') {
            let move = (1/getSpeed())*dt*this.dir;
            let prev=Math.floor(this.floor);
            this.floor=Math.max(0,Math.min(TOTAL_FLOORS-1,this.floor+move));
            let now=Math.floor(this.floor);
            if(now!==prev) this.trigger('passing_floor',{floor:now,dir:this.dir});
            if(this.queue.length>0 && (this.dir>0?this.floor>=this.queue[0]:this.floor<=this.queue[0])) {
              this.floor=this.queue[0]; this.queue.shift(); this.arrive();
            }
          }
        }
        loadUnload() {
          let f=Math.round(this.floor);
          let waiting = allPassengers.filter(p=>p.spawn===f);
          // board
          for(let p of [...waiting]) {
            if(this.canBoard(p)) {
              this.pass.push(p); allPassengers=allPassengers.filter(x=>x!==p);
              this.trigger('floor_button_pressed',p.dest);
              if(!this.queue.includes(p.dest)) this.queue.push(p.dest);
            }
          }
          // unload
          this.pass=this.pass.filter(p=>{
            if(p.dest===f) { deliver(p); return false; }
            return true;
          });
        }
      }

      class Floor { constructor(lvl){this.level=lvl; this.handlers={};}
        waitingPassengers(){return allPassengers.filter(p=>p.spawn===this.level);}
        on(ev,cb){ if(!this.handlers[ev])this.handlers[ev]=[]; this.handlers[ev].push(cb); }
        trigger(ev){ (this.handlers[ev]||[]).forEach(cb=>cb()); }
      }
</body>
</html>
